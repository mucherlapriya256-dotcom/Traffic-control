<!DOCTYPE html>
<html>
<head>
    <title>VR Traffic Management</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <style>
        body{
            margin:0;
            overflow:hidden;
        }
    </style>
</head>

<body>

<a-scene background="color:#87CEEB">

    <!-- Ground -->
    <a-plane
        rotation="-90 0 0"
        width="80"
        height="80"
        color="#5FA85F">
    </a-plane>

    <!-- Roads -->
    <a-box position="0 0.01 0"
           width="40"
           height="0.02"
           depth="6"
           color="#333">
    </a-box>

    <a-box position="0 0.01 0"
           width="6"
           height="0.02"
           depth="40"
           color="#333">
    </a-box>

    <!-- Traffic Light Pole -->
    <a-cylinder
        position="3 2 3"
        radius="0.08"
        height="4"
        color="black">
    </a-cylinder>

    <!-- Red -->
    <a-sphere
        id="redLight"
        position="3 3.2 3"
        radius="0.15"
        color="red">
    </a-sphere>

    <!-- Yellow -->
    <a-sphere
        id="yellowLight"
        position="3 2.8 3"
        radius="0.15"
        color="gray">
    </a-sphere>

    <!-- Green -->
    <a-sphere
        id="greenLight"
        position="3 2.4 3"
        radius="0.15"
        color="gray">
    </a-sphere>

    <!-- Car -->
    <a-box
        id="car"
        position="-18 0.5 0"
        width="2"
        height="1"
        depth="1"
        color="blue">
    </a-box>

    <!-- Camera -->
    <a-entity
        camera
        look-controls
        wasd-controls
        position="0 2 15">
    </a-entity>

</a-scene>

<script>

let state = "green";

const red = document.querySelector("#redLight");
const yellow = document.querySelector("#yellowLight");
const green = document.querySelector("#greenLight");
const car = document.querySelector("#car");

let carX = -18;

function updateLights(){

    red.setAttribute("color","gray");
    yellow.setAttribute("color","gray");
    green.setAttribute("color","gray");

    if(state==="green")
        green.setAttribute("color","lime");

    if(state==="yellow")
        yellow.setAttribute("color","yellow");

    if(state==="red")
        red.setAttribute("color","red");

}

function cycle(){

    if(state==="green"){
        state="yellow";
    }
    else if(state==="yellow"){
        state="red";
    }
    else{
        state="green";
    }

    updateLights();

}

updateLights();

setInterval(cycle,5000);

function animate(){

    if(state==="green"){

        carX += 0.05;

        if(carX>18)
            carX=-18;

    }
    else{

        if(carX < -2){
            carX += 0.05;
        }

    }

    car.setAttribute("position",{
        x:carX,
        y:0.5,
        z:0
    });

    requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
