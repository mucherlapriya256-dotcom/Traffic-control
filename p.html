<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VR Traffic Management</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

</head>

<body>

<a-scene>

<!-- Sky -->
<a-sky color="#87CEEB"></a-sky>

<!-- Ground -->
<a-plane
rotation="-90 0 0"
width="200"
height="200"
color="#4CAF50">
</a-plane>

<!-- Horizontal Road -->
<a-plane
position="0 0.01 0"
rotation="-90 0 0"
width="60"
height="10"
color="#444">
</a-plane>

<!-- Vertical Road -->
<a-plane
position="0 0.02 0"
rotation="-90 90 0"
width="60"
height="10"
color="#444">
</a-plane>

<!-- Road Divider -->
<a-box
position="0 0.03 -20"
depth="20"
height="0.05"
width="0.2"
color="yellow">
</a-box>

<a-box
position="0 0.03 20"
depth="20"
height="0.05"
width="0.2"
color="yellow">
</a-box>

<!-- Building 1 -->
<a-box
position="-15 3 -15"
width="6"
height="6"
depth="6"
color="#8E44AD">
</a-box>

<!-- Building 2 -->
<a-box
position="15 4 -15"
width="7"
height="8"
depth="7"
color="#3498DB">
</a-box>

<!-- Building 3 -->
<a-box
position="-15 5 15"
width="8"
height="10"
depth="8"
color="#E67E22">
</a-box>

<!-- Building 4 -->
<a-box
position="15 3 15"
width="6"
height="6"
depth="6"
color="#2ECC71">
</a-box>

<!-- Trees -->

<a-cylinder
position="-8 1 -8"
radius="0.2"
height="2"
color="#8B4513">
</a-cylinder>

<a-sphere
position="-8 2.5 -8"
radius="1"
color="green">
</a-sphere>

<a-cylinder
position="8 1 8"
radius="0.2"
height="2"
color="#8B4513">
</a-cylinder>

<a-sphere
position="8 2.5 8"
radius="1"
color="green">
</a-sphere>

<!-- Camera -->

<a-entity
camera
look-controls
wasd-controls
position="0 2 20">
</a-entity>
<!-- CAR -->

<a-box
id="car1"
position="-25 0.6 2"
width="2"
height="1"
depth="1"
color="red"
animation="
property: position;
to: 25 0.6 2;
dur: 8000;
loop: true">
</a-box>

<!-- BUS -->

<a-box
id="bus1"
position="25 0.8 -2"
width="4"
height="1.5"
depth="1.5"
color="blue"
animation="
property: position;
to: -25 0.8 -2;
dur: 12000;
loop: true">
</a-box>

<!-- BIKE -->

<a-box
id="bike1"
position="2 0.5 -25"
width="1"
height="0.5"
depth="0.5"
color="yellow"
animation="
property: position;
to: 2 0.5 25;
dur: 6000;
loop: true">
</a-box>

<!-- AMBULANCE -->

<a-box
id="ambulance1"
position="-2 0.7 25"
width="2.5"
height="1"
depth="1"
color="white"
animation="
property: position;
to: -2 0.7 -25;
dur: 5000;
loop: true">
</a-box>
</a-scene>

  



   

</script>
</body>
</html>
